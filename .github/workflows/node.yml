name: NASA Project CI
on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:  
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js version 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: pnpm install
      - run: pnpm run build --prefix client